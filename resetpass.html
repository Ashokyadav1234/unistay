<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(4,200,181,1) 35%, rgba(208,241,248,0.8381477591036415) 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: backgroundAnimation 10s infinite alternate;
        }
        @keyframes backgroundAnimation {
            0% { background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(4,200,181,1) 35%, rgba(208,241,248,0.8381477591036415) 100%); }
            100% { background: linear-gradient(90deg, rgba(208,241,248,1) 0%, rgba(4,200,181,1) 35%, rgba(255,255,255,0.8381477591036415) 100%); }
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
            animation: containerAnimation 1.5s ease-in-out;
        }
        @keyframes containerAnimation {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        h2 {
            color: #333;
            animation: textAnimation 2s infinite alternate;
        }
        @keyframes textAnimation {
            0% { color: #333; }
            100% { color: #0077ff; }
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            color: #555;
        }
        input[type="password"] {
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px;
            color: #fff;
            background-color: #04ffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0077ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Set New Password</h2>
        <form action="#" method="post">
            <label for="new-password">New Password:</label>
            <input type="password" id="new-password" name="new-password" required>
            <label for="reenter-password">Re-enter New Password:</label>
            <input type="password" id="reenter-password" name="reenter-password" required>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
