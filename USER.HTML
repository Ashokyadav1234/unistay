<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    
    <script src="user.js" defer></script>
    <style>
        body {
    font-family: 'Arial', sans-serif;
    background: url(22.png);
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background-color: rgb(44, 42, 42);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 500px;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

form h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #333;
}

.form-group {
    margin-bottom: 10px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    position: relative;
}

.tooltip {
    font-weight: bold;
    cursor: pointer;
    position: absolute;
    top: 0;
    right: 0;
    color: #888;
}

.tooltip:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    background: #333;
    color: #fff;
    padding: 5px 10px;
    border-radius: 5px;
    top: -10px;
    right: 25px;
    white-space: nowrap;
    font-size: 12px;
}

input, select {
    width: calc(100% - 20px);
    padding: 8px;
    margin-bottom: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    transition: border-color 0.3s, box-shadow 0.3s;
}

input:focus, select:focus {
    border-color: #66a6ff;
    box-shadow: 0 0 5px rgba(102, 166, 255, 0.5);
}

.error-message {
    color: red;
    font-size: 12px;
    display: none;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #28a745, #218838);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
}

button:hover {
    background: linear-gradient(to right, #493549, #4c524d);
    box-shadow: 0 4px 8px rgba(158, 127, 127, 0.2);
}

button:active {
    transform: scale(0.98);
}

@media (max-width: 600px) {
    .container {
        width: 90%;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <form id="signUpForm" action="/submit" method="POST">
            <h2>USER INFO</h2>
            <div class="form-group">
                <label for="name">Name: <span class="tooltip" data-tooltip="Please enter your full name">?</span></label>
                <input type="text" id="name" name="name" required placeholder="Enter name here">
                <small class="error-message" id="nameError"></small>
            </div>
            <!--<div class="form-group">
                <label for="phone">Phone Number: <span class="tooltip" data-tooltip="Enter a valid 10-digit phone number">?</span></label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
                <small class="error-message" id="phoneError"></small>
            </div> -->
           <!-- <div class="form-group">
                <label for="email">Email ID: <span class="tooltip" data-tooltip="Enter a valid email address">?</span></label>
                <input type="email" id="email" name="email" required>
                <small class="error-message" id="emailError"></small>
            </div> -->
            <div class="form-group">
                <label for="room">Type of Room:</label>
                <select id="room" name="room" required>
                    <option value="" disabled selected>Select room type</option>
                    <option value="single">Single</option>
                    <option value="double">Double</option>
                    <option value="suite">Suite</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ac">AC Facility:</label>
                <select id="ac" name="ac" required>
                    <option value="" disabled selected>Select AC facility</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mess">Mess Included:</label>
                <select id="mess" name="mess" required>
                    <option value="" disabled selected>Select mess option</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="college">Name of College:</label>
                <input type="text" id="college" name="college" required placeholder="Enter name of your college">
                <small class="error-message" id="collegeError"></small>
            </div>
            <div class="form-group">
                <label for="location">Location of college:</label>
                <input type="text" id="location" name="location" required placeholder="Enter the address of your college">
                <small class="error-message" id="locationError"></small>
            </div>
            <button type="submit"><a href="final.html">Find Hostels</a></button>
        </form>
    </div>
</body>
</html>
